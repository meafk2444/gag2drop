name: Test webhook

on:
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Send test webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          ROLE_ID: ${{ secrets.ROLE_ID }}
        run: node test.js
